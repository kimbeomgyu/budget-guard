version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current (security patches for the runners' actions).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # Keep npm dependencies current / flag vulnerable versions.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
