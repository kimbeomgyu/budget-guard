name: Publish

# Publishes to npm + creates a GitHub Release when you push a version tag:
#   npm version patch   # bumps package.json + creates a vX.Y.Z tag
#   git push --follow-tags
#
# npm auth is Trusted Publishing (OIDC) — NO NPM_TOKEN secret needed.
# One-time setup on npmjs.com → package "budget-guard" → Settings → Trusted Publisher:
#   Publisher: GitHub Actions | user: kimbeomgyu | repo: budget-guard | workflow: publish.yml
#   Environment: release   ← set this too, so a token minted OUTSIDE the gated
#                             environment (e.g. an edited workflow) is rejected by npm.
# Provenance attestations are generated automatically.
#
# Hardening:
#   - Two jobs: `publish` holds the OIDC token (contents: read); `release` holds
#     contents: write. No single job — and no third-party action — has both.
#   - Third-party actions pinned to a full commit SHA (comment = version); Dependabot bumps them.
#   - Privileged publish job runs no dependency lifecycle scripts and doesn't persist git creds.

on:
  push:
    tags:
      - "v*"

# Serialize publishes so two tags can't race the npm "latest" tag.
concurrency:
  group: publish
  cancel-in-progress: false

# Minimal default at the top; each job escalates to exactly what it needs below.
permissions:
  contents: read

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    # Gated by the "release" environment: GitHub pauses this job for a required
    # reviewer before the OIDC token is minted. This approval is enforced by the
    # platform regardless of what this file contains, so it survives a tampered
    # workflow at a pushed tag. Configure reviewers in repo Settings → Environments.
    environment: release
    permissions:
      id-token: write # OIDC token for npm trusted publishing
      contents: read # read the repo; publish uses OIDC, not the git token
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false # publish uses OIDC — don't leave a write token in .git/config

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24 # OIDC needs Node >= 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Ensure npm >= 11.5.1 (required for OIDC trusted publishing)
        # Node 24 already bundles npm >= 11.5.1 — verify the floor instead of
        # `npm install -g` (no unpinned command in the publish path). Fails loudly if too old.
        run: |
          need=11.5.1; have="$(npm --version)"
          if [ "$(printf '%s\n%s\n' "$need" "$have" | sort -V | tail -1)" != "$have" ]; then
            echo "::error::npm $have is older than the required $need"; exit 1
          fi
          echo "npm $have OK"

      - run: npm ci --ignore-scripts # no dependency postinstall runs in the OIDC-privileged job

      - name: Verify version (tag matches package.json AND is newer than npm latest)
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
          CUR="$(npm view budget-guard version 2>/dev/null || echo 0.0.0)"
          if [ "$PKG" = "$CUR" ]; then
            echo "::error::Version $PKG is already published to npm"
            exit 1
          fi
          HIGHEST="$(printf '%s\n%s\n' "$CUR" "$PKG" | sort -V | tail -1)"
          if [ "$HIGHEST" != "$PKG" ]; then
            echo "::error::Version $PKG is not newer than the current npm latest ($CUR) — refusing to downgrade"
            exit 1
          fi
          echo "Publishing v$PKG (current npm latest: $CUR)"

      - name: Build (tsc)
        run: npm run build

      - name: Test (vitest)
        run: npm test

      - name: Publish to npm (OIDC — no token, provenance automatic)
        run: npm publish

  release:
    name: github release
    needs: publish # only after npm publish succeeds
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release (this job has NO id-token)
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
          make_latest: true # safe: the publish job already enforced monotonic versions
