name: CodeQL

# Static analysis (SAST) for the TypeScript source. Runs on push/PR to main and
# weekly, so newly-discovered query patterns catch old code too.
# Actions are pinned to full commit SHAs (enforced repo-wide by "require SHA pinning").

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 6 * * 1" # Mondays, 06:23 UTC

# Minimal default at the top; the job escalates to security-events: write.
permissions:
  contents: read

jobs:
  analyze:
    name: analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload CodeQL results to the Security tab
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: javascript-typescript

      - name: Analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
