name: CodeQL

# Static analysis (SAST) for the TypeScript source. Runs on push/PR to main and
# weekly, so newly-discovered query patterns catch old code too.
# Actions are pinned to full commit SHAs (enforced repo-wide by "require SHA pinning").

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 6 * * 1" # Mondays, 06:23 UTC

# Minimal default at the top; the job escalates to security-events: write.
permissions:
  contents: read

jobs:
  analyze:
    name: analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload CodeQL results to the Security tab
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: javascript-typescript

      - name: Analyze
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
